# Step 3 후보 4·③: CI에서 로컬 게이트 verify:349-12와 동일한 명령을 실행한다.
# 증빙: docs/project-governance/IMPLEMENTATION_EVIDENCE.md [EVIDENCE-20260425-350]
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-349-12:
    name: verify-349-12
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Step 3 local gate (tsc, lint, canonical-sources, vitest)
        run: npm run verify:349-12
